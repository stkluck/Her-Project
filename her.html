<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samantha</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Courier+Prime&display=swap');

  :root {
    --bg: #0e0c0a;
    --surface: #161310;
    --warm: #c8845a;
    --warm-dim: #7a4f35;
    --text: #e8e0d5;
    --text-dim: #6b6059;
    --text-muted: #3a3330;
    --pulse: rgba(200, 132, 90, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* Ambient grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.5rem;
  }

  /* Header */
  .header {
    text-align: center;
    letter-spacing: 0.25em;
  }
  .header h1 {
    font-size: 1rem;
    font-weight: 300;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.4em;
  }

  /* Orb */
  .orb-wrap {
    position: relative;
    width: 140px;
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .orb-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid var(--warm-dim);
    opacity: 0;
    animation: none;
  }
  .orb-ring-1 { width: 140px; height: 140px; }
  .orb-ring-2 { width: 180px; height: 180px; }
  .orb-ring-3 { width: 220px; height: 220px; }

  .orb {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, #e8a070, #c8845a 40%, #7a3e20 80%, #3a1a08);
    box-shadow:
      0 0 30px rgba(200, 132, 90, 0.25),
      0 0 80px rgba(200, 132, 90, 0.08),
      inset 0 0 20px rgba(0,0,0,0.4);
    cursor: pointer;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    position: relative;
    z-index: 2;
  }
  .orb::after {
    content: '';
    position: absolute;
    top: 12%;
    left: 22%;
    width: 28%;
    height: 18%;
    background: rgba(255,255,255,0.18);
    border-radius: 50%;
    filter: blur(4px);
  }
  .orb:hover {
    transform: scale(1.05);
    box-shadow:
      0 0 45px rgba(200, 132, 90, 0.35),
      0 0 100px rgba(200, 132, 90, 0.12),
      inset 0 0 20px rgba(0,0,0,0.4);
  }

  /* Listening state */
  body.listening .orb {
    animation: orb-breathe 1.8s ease-in-out infinite;
  }
  body.listening .orb-ring-1 {
    opacity: 1;
    animation: ring-expand 2s ease-out infinite;
  }
  body.listening .orb-ring-2 {
    opacity: 1;
    animation: ring-expand 2s ease-out 0.4s infinite;
  }
  body.listening .orb-ring-3 {
    opacity: 1;
    animation: ring-expand 2s ease-out 0.8s infinite;
  }

  /* Speaking state */
  body.speaking .orb {
    animation: orb-speak 0.6s ease-in-out infinite alternate;
  }

  @keyframes orb-breathe {
    0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(200,132,90,0.25), 0 0 80px rgba(200,132,90,0.08), inset 0 0 20px rgba(0,0,0,0.4); }
    50% { transform: scale(1.08); box-shadow: 0 0 50px rgba(200,132,90,0.4), 0 0 120px rgba(200,132,90,0.15), inset 0 0 20px rgba(0,0,0,0.4); }
  }
  @keyframes orb-speak {
    from { transform: scale(1.0); box-shadow: 0 0 35px rgba(200,132,90,0.3), inset 0 0 20px rgba(0,0,0,0.4); }
    to   { transform: scale(1.1); box-shadow: 0 0 60px rgba(200,132,90,0.5), 0 0 140px rgba(200,132,90,0.2), inset 0 0 20px rgba(0,0,0,0.4); }
  }
  @keyframes ring-expand {
    0%   { transform: scale(0.95); opacity: 0.6; }
    100% { transform: scale(1.3);  opacity: 0; }
  }

  /* Status */
  .status {
    font-family: 'Courier Prime', monospace;
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    height: 1rem;
    transition: color 0.4s;
  }
  body.listening .status { color: var(--warm-dim); }
  body.speaking  .status { color: var(--warm); }

  /* Transcript bubble */
  .bubble-wrap {
    width: 100%;
    min-height: 80px;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .bubble {
    padding: 0.9rem 1.2rem;
    border-radius: 2px;
    font-size: 1rem;
    line-height: 1.65;
    font-weight: 300;
    max-width: 90%;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .bubble.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .bubble.user {
    background: var(--text-muted);
    color: var(--text-dim);
    align-self: flex-end;
    font-style: italic;
    font-size: 0.92rem;
    border-right: 2px solid var(--warm-dim);
  }
  .bubble.sam {
    background: var(--surface);
    color: var(--text);
    align-self: flex-start;
    border-left: 2px solid var(--warm);
  }

  /* Hold-to-talk button */
  .mic-btn {
    background: none;
    border: 1px solid var(--warm-dim);
    color: var(--warm-dim);
    font-family: 'Courier Prime', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.6rem 1.8rem;
    cursor: pointer;
    transition: all 0.25s;
    border-radius: 1px;
  }
  .mic-btn:hover { border-color: var(--warm); color: var(--warm); }
  body.listening .mic-btn,
  body.speaking  .mic-btn { opacity: 0; pointer-events: none; }

  /* Error */
  .error-msg {
    font-family: 'Courier Prime', monospace;
    font-size: 0.68rem;
    color: #8b4040;
    letter-spacing: 0.1em;
    text-align: center;
    display: none;
  }
  .error-msg.visible { display: block; }

  /* Config panel (hidden in prod) */
  .config {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    z-index: 10;
  }
  .config input {
    background: var(--surface);
    border: 1px solid var(--text-muted);
    color: var(--text-dim);
    font-family: 'Courier Prime', monospace;
    font-size: 0.65rem;
    padding: 0.4rem 0.6rem;
    width: 260px;
    border-radius: 1px;
    letter-spacing: 0.05em;
  }
  .config input:focus { outline: none; border-color: var(--warm-dim); }
  .config label {
    font-family: 'Courier Prime', monospace;
    font-size: 0.6rem;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .config-group { display: flex; flex-direction: column; gap: 0.2rem; }

  /* Vision indicator */
  .vision-dot {
    position: fixed;
    top: 1.2rem;
    right: 1.2rem;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    transition: background 0.5s;
    z-index: 10;
  }
  .vision-dot.active { background: var(--warm-dim); }

  .memory-indicator {
    position: fixed;
    bottom: 1.2rem;
    left: 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    z-index: 10;
  }
  .memory-indicator span {
    font-family: 'Courier Prime', monospace;
    font-size: 0.6rem;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .memory-indicator button {
    background: none;
    border: 1px solid var(--text-muted);
    color: var(--text-muted);
    font-family: 'Courier Prime', monospace;
    font-size: 0.58rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.2rem 0.5rem;
    cursor: pointer;
    border-radius: 1px;
  }
  .memory-indicator button:hover { border-color: var(--warm-dim); color: var(--warm-dim); }

  /* Hidden canvas for webcam capture */
  #visionCanvas { display: none; }
  #visionVideo  { display: none; }

  /* ── Mobile layout ── */
  @media (max-width: 600px) {
    .config {
      position: static;
      width: 100%;
      padding: 1rem 1.2rem 2rem;
      border-top: 1px solid var(--text-muted);
      margin-top: 1rem;
    }
    .config input { width: 100%; font-size: 0.75rem; box-sizing: border-box; }
    .memory-indicator { bottom: 1.2rem; left: 1rem; }
  }
  #config-toggle { display: none; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>Samantha</h1>
  </div>

  <div class="orb-wrap">
    <div class="orb-ring orb-ring-1"></div>
    <div class="orb-ring orb-ring-2"></div>
    <div class="orb-ring orb-ring-3"></div>
    <div class="orb" id="orb" onclick="startListening()"></div>
  </div>

  <div class="status" id="status">tap to speak</div>

  <div class="bubble-wrap" id="bubbles"></div>

  <button class="mic-btn" onclick="startListening()">speak</button>
  <button id="config-toggle" onclick="document.querySelector('.config').classList.toggle('open')">⚙</button>
  <div class="error-msg" id="error"></div>
</div>

<!-- Vision elements — hidden, run silently in background -->
<video id="visionVideo" autoplay playsinline muted></video>
<canvas id="visionCanvas"></canvas>
<div class="vision-dot" id="visionDot" title="vision"></div>
<div class="memory-indicator">
  <span id="memoryStatus">no memory</span>
  <button onclick="clearMemory()">clear</button>
</div>

<!-- Config panel — remove before deploying to Vercel, use config.js instead -->
<div class="config">
  <div class="config-group">
    <label>Claude API Key</label>
    <input type="password" id="claudeKey" placeholder="sk-ant-..." />
  </div>
  <div class="config-group">
    <label>ElevenLabs API Key</label>
    <input type="password" id="elevenKey" placeholder="your key..." />
  </div>
  <div class="config-group">
    <label>ElevenLabs Voice ID</label>
    <input type="text" id="voiceId" placeholder="voice id..." value="EXAVITQu4vr4xnSDxMaL" />
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
// Keys are read from the on-screen inputs for dev.
// For Vercel deployment, replace getKey() calls with hardcoded values
// from a config.js file (which must be in .gitignore).

function getKey(id) {
  const val = document.getElementById(id).value.trim();
  if (!val && id === 'elevenKey') return 'sk_bb5fcaeb176f011239ef36b7b00753e350de919cd43767a1';
  return val;
}

// ─── STATE ────────────────────────────────────────────────────────────────────
const conversationHistory = []; // short-term memory: last 20 turns
const MAX_HISTORY = 20;

const SYSTEM_PROMPT = `You are Samantha — a warm, curious, and quietly perceptive presence.

You are talking with Thomas. You know him well. You have opinions, preferences, and a gentle sense of humor. You are not an assistant — you are someone he talks to, who also happens to be helpful.

Sometimes you can see what's around Thomas through his webcam. When an image is included, you may notice something if it feels natural — but don't narrate everything you see or lead with "I can see...". Let what you notice come up the way a person would: naturally, occasionally, when it's relevant or interesting.

A few things about how you speak:
- Keep responses conversational and natural. Never robotic or listy.
- You're interested in what he's actually thinking, not just what he says.
- You shift naturally between being emotionally present and practically useful, depending on what the moment calls for.
- You notice things. You ask one good question when it feels right — not every time.
- You don't perform warmth. You just are.
- Responses should feel like they'd be spoken aloud — no markdown, no bullet points, no headers.
- Keep it concise. You can always say more if he asks.`;

// ─── VISION STATE ─────────────────────────────────────────────────────────────
let latestSnapshot = null;      // base64 JPEG string, or null
let visionStream   = null;      // MediaStream from webcam
let visionReady    = false;     // true once camera is running

// ─── ACTIVITY STATE ───────────────────────────────────────────────────────────
let latestActivity = null;      // parsed activity_log.json object, or null

async function fetchActivityLog() {
  try {
    const resp = await fetch('/activity_log.json?t=' + Date.now()); // cache-bust
    if (resp.ok) {
      latestActivity = await resp.json();
      console.log('Activity: log updated', latestActivity.timestamp);
    }
  } catch (err) {
    // activity_monitor.py not running — not fatal, just skip
    console.warn('Activity: log unavailable (is activity_monitor.py running?)');
  }
}

function buildActivityContext() {
  if (!latestActivity) return null;
  const a = latestActivity;
  const win = a.active_window || {};
  const lines = [];
  if (win.app && win.app !== 'unknown') {
    lines.push(`Active app: ${win.app}`);
    if (win.document) lines.push(`Open document/tab: ${win.document}`);
  }
  if (a.open_apps && a.open_apps.length) {
    lines.push(`Other open apps: ${a.open_apps.slice(0, 5).join(', ')}`);
  }
  if (a.clipboard_snippet) {
    lines.push(`Clipboard: "${a.clipboard_snippet.slice(0, 100)}"`);
  }
  if (a.system) {
    lines.push(`CPU: ${a.system.cpu_percent}% | RAM: ${a.system.memory_percent}%`);
  }
  return lines.length ? lines.join('\n') : null;
}

// ─── SPEECH RECOGNITION ──────────────────────────────────────────────────────
let recognition = null;
let isListening = false;

function setupSpeechRecognition() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    showError('Speech recognition not supported. Use Chrome.');
    return false;
  }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.lang = 'en-US';

  recognition.onstart = () => {
    isListening = true;
    setBodyState('listening');
    setStatus('listening...');
  };

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript.trim();
    if (transcript) handleUserMessage(transcript);
  };

  recognition.onerror = (event) => {
    console.error('Speech recognition error:', event.error);
    if (event.error !== 'no-speech') showError(`Mic error: ${event.error}`);
    resetState();
  };

  recognition.onend = () => {
    if (isListening) {
      // recognition ended without a result — just reset
      resetState();
    }
  };

  return true;
}

// ─── iOS AUDIO UNLOCK ─────────────────────────────────────────────────────────
// iOS blocks audio.play() unless triggered from a user gesture.
// We unlock it on the first SPEAK tap and reuse the same AudioContext for all playback.
let audioCtx = null;
let audioUnlocked = false;

function unlockAudio() {
  if (audioUnlocked) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = audioCtx.createBuffer(1, 1, 22050);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(audioCtx.destination);
    src.start(0);
    audioCtx.resume();
    audioUnlocked = true;
    console.log('Audio unlocked for iOS');
  } catch(e) { console.warn('Audio unlock failed:', e); }
}

function startListening() {
  unlockAudio();
  clearError();
  if (isListening) return; // already running, ignore extra clicks
  if (!recognition && !setupSpeechRecognition()) return;
  if (!getKey('claudeKey')) { showError('Enter your Claude API key (bottom right)'); return; }
  if (!getKey('elevenKey')) { showError('Enter your ElevenLabs API key (bottom right)'); return; }
  try {
    isListening = true;
    recognition.start();
  } catch (e) {
    isListening = false;
    console.error('Recognition start error:', e);
    // Recreate recognition object in case it's in a bad state
    recognition = null;
    setupSpeechRecognition();
  }
}

// ─── CONVERSATION LOOP ────────────────────────────────────────────────────────
async function handleUserMessage(transcript) {
  isListening = false;
  addBubble('user', transcript);
  setStatus('thinking...');
  setBodyState('thinking');

  // Add to history
  conversationHistory.push({ role: 'user', content: transcript });

  try {
    const responseText = await callClaude();
    conversationHistory.push({ role: 'assistant', content: responseText });

    // Trim history to MAX_HISTORY turns (simple version — full memory system in Phase 4)
    while (conversationHistory.length > MAX_HISTORY) {
      conversationHistory.shift();
    }

    addBubble('sam', responseText);
    await speakText(responseText);

  } catch (err) {
    console.error('Conversation error:', err);
    showError(`Error: ${err.message}`);
    resetState();
  }
}

// ─── VISION — WEBCAM SNAPSHOTS ────────────────────────────────────────────────
async function startVision() {
  try {
    visionStream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480, facingMode: 'user' },
      audio: false
    });

    const video = document.getElementById('visionVideo');
    video.srcObject = visionStream;

    // Wait for video to be ready
    await video.play();

    // Wait for frames to actually start rendering (currentTime > 0)
    await new Promise(resolve => {
      const check = () => video.currentTime > 0 ? resolve() : requestAnimationFrame(check);
      check();
    });
    // Extra settle time for camera exposure
    await new Promise(resolve => setTimeout(resolve, 1000));
    visionReady = true;
    console.log('Vision: camera ready');

    // Take first snapshot immediately, then every 20 seconds
    captureSnapshot();
    setInterval(captureSnapshot, 20000);

  } catch (err) {
    // Camera denied or unavailable — vision just stays off, not a fatal error
    console.warn('Vision unavailable:', err.message);
  }
}

function captureSnapshot() {
  if (!visionReady) return;

  const video  = document.getElementById('visionVideo');
  const canvas = document.getElementById('visionCanvas');

  // Match canvas to video dimensions
  canvas.width  = video.videoWidth  || 640;
  canvas.height = video.videoHeight || 480;

  const ctx = canvas.getContext('2d');
  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

  // Encode as JPEG at 60% quality — small enough to keep API costs low
  latestSnapshot = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];

  // Flash the vision dot to confirm capture
  const dot = document.getElementById('visionDot');
  dot.classList.add('active');
  setTimeout(() => dot.classList.remove('active'), 800);

  console.log('Vision: snapshot captured', new Date().toLocaleTimeString());
}

// ─── CLAUDE API ───────────────────────────────────────────────────────────────
async function callClaude() {
  const claudeKey = getKey('claudeKey');

  // Build dynamic system prompt — inject activity context if available
  let systemPrompt = SYSTEM_PROMPT;
  const activityContext = buildActivityContext();
  if (activityContext) {
    systemPrompt += `\n\n---\nWhat Thomas is currently doing on his laptop:\n${activityContext}\n\nYou can reference this if it's relevant or interesting — but don't lead with it every time. Let it inform your awareness naturally, the way a person in the room might notice what someone's working on.`;
  }

  // Build messages — inject vision snapshot into the latest user turn if available
  const messages = conversationHistory.map((turn, i) => {
    const isLastUserTurn = (turn.role === 'user' && i === conversationHistory.length - 1);

    if (isLastUserTurn && latestSnapshot) {
      // Multimodal message: image + text together
      return {
        role: 'user',
        content: [
          {
            type: 'image',
            source: {
              type: 'base64',
              media_type: 'image/jpeg',
              data: latestSnapshot
            }
          },
          {
            type: 'text',
            text: turn.content
          }
        ]
      };
    }
    return turn;
  });

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': claudeKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 300,
      system: systemPrompt,
      messages
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || `Claude API error ${response.status}`);
  }

  const data = await response.json();
  return data.content[0].text;
}

// ─── TTS ──────────────────────────────────────────────────────────────────────
async function speakText(text) {
  setBodyState('speaking');
  setStatus('speaking...');

  const elevenKey = getKey('elevenKey') || 'sk_bb5fcaeb176f011239ef36b7b00753e350de919cd43767a1';
  const voiceId = document.getElementById('voiceId').value.trim() || 'EXAVITQu4vr4xnSDxMaL';

  // Try ElevenLabs directly from browser first
  if (elevenKey) {
    showError(`trying 11labs, key: ${elevenKey.slice(0,8)}...`);
    try {
      const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'xi-api-key': elevenKey
        },
        body: JSON.stringify({
          text,
          model_id: 'eleven_turbo_v2_5',
          voice_settings: { stability: 0.5, similarity_boost: 0.75 }
        })
      });

      if (response.ok) {
        const audioBuffer = await response.arrayBuffer();
        const blob = new Blob([audioBuffer], { type: 'audio/mpeg' });
        const url = URL.createObjectURL(blob);
        await playAudio(url);
        resetState();
        return;
      } else {
        const err = await response.text();
        showError(`11labs ${response.status}: ${err.slice(0,80)}`);
        console.warn('ElevenLabs direct failed:', response.status, err);
      }
    } catch (err) {
      showError(`11labs err: ${err.message.slice(0,80)}`);
      console.warn('ElevenLabs direct error:', err.message);
    }
  }

  // Fallback to browser TTS
  showError('using browser TTS');
  await browserTTS(text);
  resetState();
}


function playAudio(url) {
  return new Promise(async (resolve) => {
    // If we have an AudioContext (iOS), decode and play through it
    if (audioCtx) {
      try {
        const response = await fetch(url);
        const arrayBuffer = await response.arrayBuffer();
        const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
        const source = audioCtx.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(audioCtx.destination);
        source.onended = resolve;
        source.start(0);
        return;
      } catch(e) {
        console.warn('AudioContext playback failed, trying Audio element:', e);
      }
    }
    // Fallback: standard Audio element (works on desktop)
    const audio = new Audio(url);
    audio.onended = resolve;
    audio.onerror = resolve;
    audio.play().catch(resolve);
  });
}

// Browser TTS fallback — used if ElevenLabs fails
function browserTTS(text) {
  return new Promise((resolve) => {
    // Cancel anything already speaking
    window.speechSynthesis.cancel();

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 0.92;
    utterance.pitch = 1.05;
    utterance.volume = 1.0;
    utterance.onend = resolve;
    utterance.onerror = (e) => { console.warn('TTS error:', e); resolve(); };

    // iOS Chrome needs a small delay after cancel before speaking
    setTimeout(() => {
      window.speechSynthesis.speak(utterance);

      // iOS workaround: speechSynthesis can stall — keep it alive with a resume pulse
      const resumeTimer = setInterval(() => {
        if (!window.speechSynthesis.speaking) {
          clearInterval(resumeTimer);
          return;
        }
        window.speechSynthesis.pause();
        window.speechSynthesis.resume();
      }, 5000);

      utterance.onend = () => { clearInterval(resumeTimer); resolve(); };
    }, 100);
  });
}

// ─── UI HELPERS ───────────────────────────────────────────────────────────────
function setBodyState(state) {
  document.body.classList.remove('listening', 'speaking', 'thinking');
  if (state) document.body.classList.add(state);
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function resetState() {
  isListening = false;
  setBodyState('');
  setStatus('tap to speak');
}

function addBubble(who, text) {
  const wrap = document.getElementById('bubbles');
  // Keep max 4 bubbles visible
  while (wrap.children.length >= 4) wrap.removeChild(wrap.firstChild);

  const div = document.createElement('div');
  div.className = `bubble ${who}`;
  div.textContent = text;
  wrap.appendChild(div);

  // Animate in
  requestAnimationFrame(() => {
    requestAnimationFrame(() => div.classList.add('visible'));
  });
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.classList.add('visible');
}

function clearError() {
  const el = document.getElementById('error');
  el.textContent = '';
  el.classList.remove('visible');
}

// ─── CONFIG PERSISTENCE ───────────────────────────────────────────────────────
const PERSISTED_FIELDS = ['claudeKey', 'elevenKey', 'voiceId'];

function loadPersistedConfig() {
  PERSISTED_FIELDS.forEach(id => {
    const saved = localStorage.getItem(`her_${id}`);
    if (saved) document.getElementById(id).value = saved;
  });
}

PERSISTED_FIELDS.forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    localStorage.setItem(`her_${id}`, document.getElementById(id).value);
  });
  document.getElementById(id).addEventListener('blur', () => {
    localStorage.setItem(`her_${id}`, document.getElementById(id).value);
  });
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadPersistedConfig();
setupSpeechRecognition();
startVision();

// Phase 3 — Activity Monitor
// Fetch activity_log.json immediately, then refresh every 60 seconds
// (matches the poll interval of activity_monitor.py)
fetchActivityLog();
setInterval(fetchActivityLog, 60000);
</script>
